<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <style>
    body { background: #1a311a; margin: 0; padding: 60px 40px; font-family: Georgia, serif; display: flex; flex-wrap: wrap; gap: 60px; justify-content: center; align-items: flex-start; }
    .card { background: #0f1f0f; border: 1px solid #2a4a2a; padding: 50px 40px 36px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .label { color: #c9a84c; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-align: center; }
    .desc { color: rgba(245,240,232,0.4); font-size: 10px; text-align: center; max-width: 220px; line-height: 1.8; font-family: sans-serif; }
  </style>
</head>
<body>

<!-- Single plant - flowers top only, starlike -->

  <div class="label">Standalone</div>

    <path d="M40,102 L34,97" stroke="white" stroke-width="0.45" stroke-linecap="round" opacity="0.5"/>

  </svg>
  <div class="desc">Flowers on top only, star-like lateral sepals that taper to a fine point</div>
</div>
