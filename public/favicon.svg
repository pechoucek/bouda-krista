<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#1a311a"/>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chimney -->
  <rect x="13" y="4" width="2.5" height="4" stroke="white" stroke-width="0.8" fill="none"/>
  <!-- Roof -->
  <polyline points="4,16 16,4 28,16" stroke="white" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Walls -->
  <rect x="6" y="16" width="20" height="11" stroke="white" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="13" y="20" width="6" height="7" stroke="white" stroke-width="0.9" fill="none"/>
  <!-- Left window (glowing) -->
  <g filter="url(#glow)">
    <rect x="8" y="18" width="4" height="4" fill="#f5c842" rx="0.3"/>
  </g>
  <!-- Right window (glowing) -->
  <g filter="url(#glow)">
    <rect x="20" y="18" width="4" height="4" fill="#f5c842" rx="0.3"/>
  </g>
</svg>
