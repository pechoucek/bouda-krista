<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" fill="#1a311a"/>
  <defs>
    <filter id="g">
      <feGaussianBlur stdDeviation="1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Chimney -->
  <rect x="17" y="5" width="2.5" height="5" stroke="white" stroke-width="0.8" fill="none"/>
  <!-- Gable -->
  <polyline points="3,18 16,4 29,18" stroke="white" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Base -->
  <rect x="3" y="18" width="26" height="11" stroke="white" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
  <line x1="1" y1="18" x2="31" y2="18" stroke="white" stroke-width="0.7"/>
  <!-- Gable top window -->
  <g filter="url(#g)"><rect x="13" y="8" width="6" height="4" fill="#f5c842" rx="0.3"/></g>
  <!-- Gable side windows -->
  <g filter="url(#g)">
    <rect x="7"  y="13" width="5" height="4" fill="#f5c842" rx="0.3"/>
    <rect x="20" y="13" width="5" height="4" fill="#f5c842" rx="0.3"/>
  </g>
  <!-- Base windows -->
  <g filter="url(#g)">
    <rect x="5"  y="20" width="7" height="6" fill="#f5c842" rx="1"/>
    <rect x="20" y="20" width="7" height="6" fill="#f5c842" rx="1"/>
  </g>
  <!-- Door -->
  <rect x="13" y="22" width="6" height="7" stroke="white" stroke-width="0.8" fill="none" rx="0.5"/>
</svg>
